# Configurações da Aplicação - RAS Tarifas de Água API
spring.application.name=tarifas-agua-api
server.port=8080

# Configurações do Banco de Dados PostgreSQL

spring.datasource.url=jdbc:postgresql://localhost:5432/tabela_tarifaria
spring.datasource.username=postgres
spring.datasource.password=110216
// spring.datasource.driver-class-name=org.postgresql.Drive

# Pool de conexões HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000


# Configurações JPA / Hibernate

# validate: valida o schema sem criar/alterar tabelas (use em produção)
# update: atualiza o schema automaticamente (use em desenvolvimento)
# create: cria o schema do zero a cada inicialização
# create-drop: cria e destrói o schema ao encerrar
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#
# Configurações de Log

logging.level.com.ras=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# Configurações de Serialização JSON

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
